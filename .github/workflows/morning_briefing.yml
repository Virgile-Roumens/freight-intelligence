name: Morning Briefing — Dry Bulk

# Runs in GitHub's cloud — independent of your laptop being on or off.
#
# Cron schedule (GitHub Actions cron is in UTC):
#   - Summer (CEST = UTC+2): 05:30 UTC = 07:30 local  → months 3-10
#   - Winter (CET  = UTC+1): 06:30 UTC = 07:30 local  → months 11,12,1,2
#
# Two cron lines so the email lands at 07:30 Geneva time year-round.
# DST transition days (last Sun of Mar/Oct) may be off by 1 hour — acceptable.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   GMAIL_USER          — your Gmail address (e.g., virgile.roumens@gmail.com)
#   GMAIL_APP_PASSWORD  — 16-char Google App Password (NOT your normal password)
#                         Create at: https://myaccount.google.com/apppasswords
#                         (requires 2-Step Verification enabled)
#   AIS_API_KEY         — aisstream.io key (optional but recommended)
#   FRED_API_KEY        — FRED API key (optional)

on:
  schedule:
    - cron: '30 5 * 3-10 *'        # Summer (CEST) — 07:30 local
    - cron: '30 6 * 1,2,11,12 *'   # Winter (CET)  — 07:30 local
  workflow_dispatch:                # Manual trigger from GitHub UI for testing

jobs:
  send-briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Send morning briefing
        env:
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          BRIEFING_TO:        virgile.roumens@gmail.com
          AIS_API_KEY:        ${{ secrets.AIS_API_KEY }}
          FRED_API_KEY:       ${{ secrets.FRED_API_KEY }}
        run: python scripts/morning_briefing.py
