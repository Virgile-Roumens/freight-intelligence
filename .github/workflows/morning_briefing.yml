name: Morning Briefing — Dry Bulk

# Runs in GitHub's cloud — independent of your laptop being on or off.
#
# IMPORTANT note on timing:
#   GitHub Actions cron has NO SLA. Common minute marks (:00, :30) are heavily
#   congested and can be delayed by 1-3+ hours. We schedule on `:07` past the
#   hour (uncommon) and start 1+ hour BEFORE 07:30 to absorb typical delays.
#
#   Summer (CEST = UTC+2): 04:07 UTC → typically delivers 04:30-06:30 UTC = 06:30-08:30 CEST
#   Winter (CET  = UTC+1): 05:07 UTC → typically delivers 05:30-07:30 UTC = 06:30-08:30 CET
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   GMAIL_USER          — Gmail address
#   GMAIL_APP_PASSWORD  — 16-char Google App Password
#   AIS_API_KEY         — aisstream.io key (optional)
#   FRED_API_KEY        — FRED API key (optional)

on:
  schedule:
    - cron: '7 4 * 3-10 *'         # Summer (CEST) — fires at 04:07 UTC = 06:07 CEST
    - cron: '7 5 * 1,2,11,12 *'    # Winter (CET)  — fires at 05:07 UTC = 06:07 CET
  workflow_dispatch:                # Manual trigger from GitHub UI

# Allow the workflow to commit BDI history back to the repo
permissions:
  contents: write

jobs:
  send-briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Send morning briefing
        env:
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          BRIEFING_TO:        virgile.roumens@gmail.com
          AIS_API_KEY:        ${{ secrets.AIS_API_KEY }}
          FRED_API_KEY:       ${{ secrets.FRED_API_KEY }}
        run: python scripts/morning_briefing.py

      # Persist today's BDI value back to the repo so history accumulates
      # across runs. If nothing changed, the commit is a no-op.
      - name: Commit BDI history
        if: success()
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name  "FreightIQ Bot"
          git add data/bdi_history.json || true
          if git diff --cached --quiet; then
            echo "No BDI history changes to commit."
          else
            git commit -m "Update BDI history $(date -u +%Y-%m-%d)"
            git push
          fi
